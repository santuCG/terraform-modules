<svg xmlns="http://www.w3.org/2000/svg" width="900" height="520" viewBox="0 0 900 520">
  <style>
    .box { fill:#1f2937; stroke:#60a5fa; stroke-width:2; rx:16; ry:16; }
    .text { fill:#f8fafc; font-family:Inter, Arial, sans-serif; font-size:16px; }
    .title { fill:#e2e8f0; font-family:Inter, Arial, sans-serif; font-size:18px; font-weight:700; }
    .arrow { stroke:#93c5fd; stroke-width:3; marker-end:url(#arrowhead); }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0 L10,3.5 L0,7 Z" fill="#93c5fd" />
    </marker>
  </defs>

  <rect x="20" y="20" width="860" height="70" class="box" fill="#0f172a"/>
  <text x="40" y="55" class="title">Terraform Automation & Deployment Flow</text>

  <rect x="60" y="120" width="220" height="100" class="box"/>
  <text x="80" y="155" class="text">GitHub Actions</text>
  <text x="80" y="180" class="text">workflow_dispatch</text>
  <text x="80" y="205" class="text">inputs: run_static_analysis, destroy</text>

  <rect x="320" y="120" width="220" height="100" class="box"/>
  <text x="340" y="155" class="text">Checkov Scan</text>
  <text x="340" y="180" class="text">Static security validation</text>

  <rect x="580" y="120" width="220" height="100" class="box"/>
  <text x="600" y="155" class="text">Optional TFLint</text>
  <text x="600" y="180" class="text">Conditional on dispatch input</text>

  <path d="M280 170 L320 170" class="arrow" />
  <path d="M540 170 L580 170" class="arrow" />

  <rect x="320" y="260" width="220" height="100" class="box"/>
  <text x="340" y="295" class="text">Terraform Plan</text>
  <text x="340" y="320" class="text">fmt, init, validate, plan</text>

  <path d="M690 170 L740 170 L740 310" class="arrow" />
  <path d="M560 310 L540 310" class="arrow" />
  <path d="M540 310 L460 310" class="arrow" />

  <rect x="580" y="360" width="220" height="100" class="box"/>
  <text x="600" y="395" class="text">Manual Approval</text>
  <text x="600" y="420" class="text">Environment gate with timeout</text>

  <path d="M430 310 L430 360" class="arrow" />
  <path d="M430 360 L580 360" class="arrow" />

  <rect x="320" y="420" width="220" height="80" class="box"/>
  <text x="340" y="455" class="text">Terraform Deploy</text>
  <text x="340" y="480" class="text">apply or destroy</text>

  <path d="M690 420 L740 420" class="arrow" />
  <path d="M740 420 L740 460 L560 460" class="arrow" />
</svg>
