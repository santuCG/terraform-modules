name: "Terraform"

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
    inputs:
      run_static_analysis:
        description: "Run optional static code analysis (TFLint)"
        required: false
        default: false
        type: boolean
      destroy:
        description: "Run terraform destroy instead of apply"
        required: false
        default: false
        type: boolean

jobs:
  checkov_scan:
    name: "Checkov Scan"
    runs-on: ubuntu-latest
    permissions: read-all
    env:
      working-directory: infra/aws/terraform/modules/network
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/aws/terraform/modules/network

  static_analysis:
    name: "Optional Static Code Analysis"
    needs: [checkov_scan]
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_static_analysis == 'true' }}
    runs-on: ubuntu-latest
    permissions: read-all
    env:
      working-directory: infra/aws/terraform/modules/network
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.3.8

      - name: Run TFLint
        run: |
          curl -sSL https://raw.githubusercontent.com/terraform-linters/tflint/master/install_linux.sh | bash
          ./tflint --init
          ./tflint
        working-directory: ${{ env.working-directory }}

  terraform_plan:
    name: "Terraform Plan"
    needs: [checkov_scan, static_analysis]
    runs-on: ubuntu-latest
    permissions: read-all
    env:
      working-directory: infra/aws/terraform/modules/network
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.3.8

      - name: Terraform Format
        run: terraform fmt -check
        working-directory: ${{ env.working-directory }}

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.working-directory }}
        env:
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}

      - name: Terraform Validate
        run: terraform validate -no-color
        working-directory: ${{ env.working-directory }}

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false
        working-directory: ${{ env.working-directory }}
        env:
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}

  manual_approval:
    name: "Manual Approval"
    needs: [terraform_plan]
    runs-on: ubuntu-latest
    environment: manual-approval
    timeout-minutes: 30
    steps:
      - name: Await manual approval
        run: |
          echo "This job represents a manual approval gate after terraform plan."
          echo "If you want auto-continue after 15 minutes, configure the 'manual-approval' environment wait timer in repository settings."

  terraform_deploy:
    name: "Terraform Deploy"
    needs: [manual_approval]
    runs-on: ubuntu-latest
    environment: Dev
    permissions: read-all
    env:
      working-directory: infra/aws/terraform/modules/network
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.3.8

      - name: Terraform Init
        run: terraform init
        working-directory: ${{ env.working-directory }}
        env:
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}

      - name: Terraform Deploy
        run: |
          if [ "${{ github.event.inputs.destroy }}" = 'true' ]; then
            terraform destroy -auto-approve -input=false
          else
            terraform apply -auto-approve -input=false
          fi
        working-directory: ${{ env.working-directory }}
        env:
          AWS_ACCESS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
          AWS_SECRET_KEY: ${{ secrets.AWS_SECRET_KEY }}
 