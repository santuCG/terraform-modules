name: "Terraform Deployment Flow"

on:
  workflow_dispatch:
    inputs:
      run_static_analysis:
        description: "Run optional static analysis (TFLint)?"
        required: false
        default: false
        type: boolean
      destroy:
        description: "Destroy infrastructure instead of deploying?"
        required: false
        default: false
        type: boolean

concurrency:
  group: terraform-deployment
  cancel-in-progress: false

jobs:
  security_scan:
    name: "1. Checkov Security Scan"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/aws/terraform/modules/network
          framework: terraform
          soft_fail: false

  static_analysis:
    name: "2. Optional TFLint"
    needs: security_scan
    if: ${{ github.event.inputs.run_static_analysis == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v3
        with:
          tflint_version: latest

      - name: Run TFLint
        run: |
          cd infra/aws/terraform/modules/network
          tflint --init
          tflint -f compact

  terraform_plan:
    name: "3. Terraform Plan"
    needs: [security_scan, static_analysis]
    if: |
      always() &&
      (needs.security_scan.result == 'success') &&
      (needs.static_analysis.result == 'success' || needs.static_analysis.result == 'skipped')
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: infra/aws/terraform/modules/network

      - name: Terraform Init
        run: terraform init
        working-directory: infra/aws/terraform/modules/network

      - name: Terraform Validate
        run: terraform validate
        working-directory: infra/aws/terraform/modules/network

      - name: Terraform Plan
        id: plan
        run: terraform plan -input=false -out=tfplan
        working-directory: infra/aws/terraform/modules/network

      - name: Upload Plan Artifact
        uses: actions/upload-artifact@v3
        with:
          name: tfplan
          path: infra/aws/terraform/modules/network/tfplan

  terraform_apply_destroy:
    name: "4. Deploy or Destroy"
    needs: terraform_plan
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: terraform init
        working-directory: infra/aws/terraform/modules/network

      - name: Download Plan Artifact
        uses: actions/download-artifact@v3
        with:
          name: tfplan
          path: infra/aws/terraform/modules/network

      - name: Terraform Apply
        if: ${{ github.event.inputs.destroy == 'false' }}
        run: terraform apply -input=false -auto-approve tfplan
        working-directory: infra/aws/terraform/modules/network

      - name: Terraform Destroy
        if: ${{ github.event.inputs.destroy == 'true' }}
        run: terraform destroy -auto-approve
        working-directory: infra/aws/terraform/modules/network
 